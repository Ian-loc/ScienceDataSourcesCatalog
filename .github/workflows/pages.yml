name: Publicar no GitHub Pages
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Executar diagnóstico de qualidade
        id: quality
        shell: bash
        run: |
          set +e
          python3 scripts/validate_quality_correction_plan.py > quality-validation.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          cat quality-validation.log
          exit 0
      - name: Publicar diagnóstico temporário
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-validation-log
          path: quality-validation.log
      - name: Bloquear falha da validação de qualidade
        if: steps.quality.outputs.exit_code != '0'
        run: exit 1
      - name: Validar CSV e gerar artefatos
        run: python3 scripts/build_catalog.py
      - name: Validar proposta de esquema
        run: python3 scripts/validate_schema_draft.py
      - name: Validar matriz de migração DATA1-B
        run: python3 scripts/validate_migration_matrix.py
      - name: Validar objetivos finais e prontidão para DOI
        run: python3 scripts/validate_doi_readiness.py
      - name: Validar interface estática
        run: |
          python3 scripts/validate_frontend.py
          node --check assets/app.js
          node --check assets/analytics.js
          node --check assets/build-meta.js
  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gerar artefatos do site
        run: python3 scripts/build_catalog.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
